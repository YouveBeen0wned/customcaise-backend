services:
  - type: web
    name: customcaise-backend
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_STORE
        sync: false
      - key: SHOPIFY_ADMIN_TOKEN
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_API_VERSION
        value: '2025-07'
      - key: PRINTIFY_API_TOKEN
        sync: false
      - key: PRINTIFY_SHOP_ID
        sync: false
      - key: PRINTIFY_BLUEPRINT_ID
        value: '841'
      - key: PRINTIFY_PRINT_PROVIDER_ID
        value: '88'
      - key: SHOPIFY_MASTER_PRODUCT_ID
        sync: false
